<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D PHOTO TOOLS | PRO EDITOR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --panel: #121212; --slider-track: #333; --slider-thumb: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { background: var(--panel); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .logo { font-family: 'Orbitron', sans-serif; color: #fff; letter-spacing: 1px; font-size: 0.9rem; }
        .btn-sm { background: #222; border: none; color: white; padding: 6px 14px; border-radius: 20px; font-size: 11px; cursor: pointer; font-weight: 600; }
        .btn-save { background: #fff; color: #000; }

        /* Workspace (Photo Area) */
        .workspace { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; padding: 15px; position: relative; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        #imgToCrop { display: none; max-width: 100%; }

        /* Lightroom Style Controls */
        .controls-wrapper { background: var(--panel); padding: 20px 15px 10px 15px; border-top: 1px solid #1a1a1a; }
        
        .slider-container { display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto 20px auto; }
        .slider-row { display: flex; flex-direction: column; gap: 8px; }
        .slider-row label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        /* Professional Lightroom Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: var(--slider-track);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--slider-thumb);
            cursor: pointer;
            margin-top: -6px; /* Center thumb on track */
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* Bottom Navigation */
        .bottom-menu { display: flex; justify-content: space-around; align-items: center; padding: 10px 0; border-top: 1px solid #1a1a1a; }
        .menu-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #555; }
        .menu-item.active, .menu-item:hover { color: #fff; }
        .menu-item i { font-size: 18px; margin-bottom: 5px; }
        .menu-item span { font-size: 9px; font-weight: 600; }

        #applyCrop { position: absolute; top: 20px; right: 20px; z-index: 100; display: none; background: #fff; color: #000; padding: 8px 16px; border-radius: 20px; border: none; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>

<header>
    <div class="logo">D PHOTO TOOLS</div>
    <div style="display: flex; gap: 10px;">
        <input type="file" id="upload" hidden>
        <label for="upload" class="btn-sm">ADD</label>
        <button id="download" class="btn-sm btn-save">EXPORT</button>
    </div>
</header>

<main class="workspace">
    <img id="imgToCrop">
    <canvas id="canvas"></canvas>
    <button id="applyCrop">DONE</button>
</main>

<div class="controls-wrapper">
    <div class="slider-container">
        <div class="slider-row">
            <label>Exposure (Brightness)</label>
            <input type="range" id="bright" min="0" max="200" value="100">
        </div>
        <div class="slider-row">
            <label>Contrast</label>
            <input type="range" id="contr" min="0" max="200" value="100">
        </div>
        <div class="slider-row">
            <label>Saturation</label>
            <input type="range" id="satur" min="0" max="200" value="100">
        </div>
    </div>

    <nav class="bottom-menu">
        <div class="menu-item" id="cropBtn"><i>✂️</i><span>CROP</span></div>
        <div class="menu-item" onclick="applyPreset('grayscale(100%)')"><i>🌑</i><span>B&W</span></div>
        <div class="menu-item" onclick="resetAll()"><i>🔄</i><span>RESET</span></div>
        <div class="menu-item">
            <input type="color" id="bgColor" value="#000000" style="width:20px; height:20px; border:none; background:none; cursor:pointer;">
            <span>BG COLOR</span>
        </div>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const imgDisplay = document.getElementById('imgToCrop');
    let activeImg = new Image();
    let cropper;

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            activeImg.src = f.target.result;
            activeImg.onload = () => {
                imgDisplay.src = activeImg.src;
                render();
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function render() {
        if(!activeImg.src) return;
        canvas.width = activeImg.width;
        canvas.height = activeImg.height;
        
        ctx.fillStyle = document.getElementById('bgColor').value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const b = document.getElementById('bright').value;
        const c = document.getElementById('contr').value;
        const s = document.getElementById('satur').value;
        
        ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
        ctx.drawImage(activeImg, 0, 0);
    }

    document.querySelectorAll('input').forEach(input => {
        input.oninput = render;
    });

    function applyPreset(f) {
        ctx.filter = f;
        ctx.drawImage(activeImg, 0, 0);
    }

    function resetAll() {
        document.getElementById('bright').value = 100;
        document.getElementById('contr').value = 100;
        document.getElementById('satur').value = 100;
        document.getElementById('bgColor').value = "#000000";
        render();
    }

    document.getElementById('cropBtn').onclick = () => {
        if(!activeImg.src) return;
        canvas.style.display = 'none';
        imgDisplay.style.display = 'block';
        document.getElementById('applyCrop').style.display = 'block';
        cropper = new Cropper(imgDisplay, { viewMode: 1 });
    };

    document.getElementById('applyCrop').onclick = () => {
        activeImg.src = cropper.getCroppedCanvas().toDataURL();
        activeImg.onload = () => {
            render();
            canvas.style.display = 'block';
            imgDisplay.style.display = 'none';
            document.getElementById('applyCrop').style.display = 'none';
            cropper.destroy();
        };
    };

    document.getElementById('download').onclick = () => {
        const link = document.createElement('a');
        link.download = 'D_Photo_Tools.png';
        link.href = canvas.toDataURL();
        link.click();
    };
</script>
</body>
</html>
