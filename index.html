<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D PHOTO TOOLS | PRO EDITOR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --panel: #121212; --accent: #ff0055; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header Area */
        header { background: var(--panel); padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; z-index: 10; }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 1.2rem; }
        .header-btns { display: flex; gap: 10px; }

        /* Main Viewport */
        .editor-container { flex: 1; display: flex; position: relative; background: #000; overflow: hidden; }

        /* Sidebar for Adjustments */
        .adjust-sidebar { width: 260px; background: var(--panel); padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 20px; }
        h3 { font-size: 10px; text-transform: uppercase; color: #555; letter-spacing: 2px; margin-bottom: 10px; }

        /* Center Canvas Area (Photo Big & Centered) */
        .workspace { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .canvas-holder { max-width: 100%; max-height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 80vh; object-fit: contain; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        #imgToCrop { display: none; max-width: 100%; max-height: 80vh; }

        /* Bottom Toolbar (PicsArt Style) */
        .bottom-toolbar { background: var(--panel); height: 80px; display: flex; justify-content: center; align-items: center; gap: 30px; border-top: 1px solid #222; }
        .tool-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; transition: 0.3s; }
        .tool-icon:hover { color: var(--neon); }
        .tool-icon span { font-size: 11px; margin-top: 5px; }

        /* Buttons & Inputs */
        input[type="range"] { width: 100%; accent-color: var(--neon); cursor: pointer; }
        .btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .btn-neon { background: var(--neon); color: black; font-weight: bold; border: none; }
        
        /* Cropper Customization */
        .cropper-view-box, .cropper-face { border-radius: 0; }
    </style>
</head>
<body>

<header>
    <div class="logo">D PHOTO TOOLS</div>
    <div class="header-btns">
        <input type="file" id="upload" hidden>
        <label for="upload" class="btn">IMPORT</label>
        <button id="download" class="btn btn-neon">EXPORT</button>
    </div>
</header>

<div class="editor-container">
    <!-- Sidebar: Live Adjustments -->
    <aside class="adjust-sidebar">
        <div>
            <h3>Adjustments</h3>
            <label style="font-size: 12px; color: #aaa;">Brightness</label>
            <input type="range" id="bright" min="0" max="200" value="100">
            
            <label style="font-size: 12px; color: #aaa; margin-top: 15px; display: block;">Contrast</label>
            <input type="range" id="contr" min="0" max="200" value="100">
        </div>
        
        <div>
            <h3>Background</h3>
            <label style="font-size: 12px; color: #aaa;">BG Color</label>
            <input type="color" id="bgColor" value="#000000" style="width:100%; height:30px; border:none; background:none;">
        </div>
    </aside>

    <!-- Main Photo Area: Centered and Large -->
    <main class="workspace">
        <div class="canvas-holder">
            <img id="imgToCrop">
            <canvas id="canvas"></canvas>
        </div>
        <!-- Apply Crop Floating Button -->
        <button id="applyCrop" class="btn btn-neon" style="position:absolute; bottom: 20px; display:none; z-index: 100;">APPLY CROP</button>
    </main>
</div>

<!-- Bottom PicsArt Menu -->
<nav class="bottom-toolbar">
    <div class="tool-icon" id="cropBtn">
        <div style="font-size: 20px;">✂️</div>
        <span>CROP</span>
    </div>
    <div class="tool-icon" onclick="applyPreset('grayscale(100%)')">
        <div style="font-size: 20px;">🎭</div>
        <span>B&W</span>
    </div>
    <div class="tool-icon" onclick="applyPreset('hue-rotate(90deg)')">
        <div style="font-size: 20px;">🌈</div>
        <span>NEON</span>
    </div>
    <div class="tool-icon" onclick="applyPreset('none')">
        <div style="font-size: 20px;">🔄</div>
        <span>RESET</span>
    </div>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const imgDisplay = document.getElementById('imgToCrop');
    let activeImg = new Image();
    let cropper;

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            activeImg.src = f.target.result;
            activeImg.onload = () => {
                imgDisplay.src = activeImg.src;
                render();
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function render() {
        // Photo size calculation
        canvas.width = activeImg.width;
        canvas.height = activeImg.height;
        
        // Fill Background
        ctx.fillStyle = document.getElementById('bgColor').value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Live Adjustments
        const b = document.getElementById('bright').value;
        const c = document.getElementById('contr').value;
        ctx.filter = `brightness(${b}%) contrast(${c}%)`;
        
        // Center draw
        ctx.drawImage(activeImg, 0, 0);
    }

    // Live Change on Input
    document.querySelectorAll('input').forEach(input => {
        input.oninput = render;
    });

    function applyPreset(f) {
        ctx.filter = f;
        ctx.drawImage(activeImg, 0, 0);
    }

    // Crop Implementation
    document.getElementById('cropBtn').onclick = () => {
        if(!activeImg.src) return alert("Pehle photo load karo!");
        canvas.style.display = 'none';
        imgDisplay.style.display = 'block';
        document.getElementById('applyCrop').style.display = 'block';
        cropper = new Cropper(imgDisplay, { viewMode: 1, guides: true });
    };

    document.getElementById('applyCrop').onclick = () => {
        activeImg.src = cropper.getCroppedCanvas().toDataURL();
        activeImg.onload = () => {
            render();
            canvas.style.display = 'block';
            imgDisplay.style.display = 'none';
            document.getElementById('applyCrop').style.display = 'none';
            cropper.destroy();
        };
    };

    document.getElementById('download').onclick = () => {
        const link = document.createElement('a');
        link.download = 'D_Photo_Edit.png';
        link.href = canvas.toDataURL();
        link.click();
    };
</script>
</body>
</html>
