<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D PHOTO TOOLS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --bg: #ffffff; --panel: #000000; --text: #333; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; }
        
        .app { display: flex; flex-direction: column; height: 100vh; }
        header { height: 55px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .logo { font-weight: 800; font-size: 16px; letter-spacing: 1px; }

        /* Workspace - Photo focus */
        .viewport { flex: 1; display: flex; justify-content: center; align-items: center; background: #f4f4f4; position: relative; padding: 20px; }
        #canvas { max-width: 100%; max-height: 100%; object-fit: contain; background: #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #imgToCrop { display: none; }

        /* Adjustment Panel (Black) */
        .adj-panel { 
            position: absolute; bottom: 85px; left: 10px; right: 10px; 
            background: var(--panel); border-radius: 15px; padding: 20px; 
            display: none; flex-direction: column; gap: 15px; z-index: 50; 
        }
        .adj-row { display: flex; align-items: center; gap: 15px; color: #fff; font-size: 12px; }
        .adj-row input { flex: 1; accent-color: #fff; }

        /* Bottom Toolbar (White) */
        .toolbar { height: 80px; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; background: #fff; }
        .t-btn { border: none; background: none; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; color: #888; cursor: pointer; }
        .t-btn:active { color: #000; }

        .save-btn { background: #000; color: #fff; border: none; padding: 7px 15px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        #doneCrop { position: absolute; top: 10px; right: 10px; background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; display: none; z-index: 100; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="logo">D PHOTO TOOLS</div>
        <div style="display:flex; gap:10px;">
            <input type="file" id="up" hidden accept="image/*">
            <button onclick="document.getElementById('up').click()" class="save-btn" style="background:#eee; color:#000;">ADD</button>
            <button id="save" class="save-btn">SAVE</button>
        </div>
    </header>

    <main class="viewport">
        <canvas id="canvas"></canvas>
        <img id="imgToCrop">
        <button id="doneCrop">DONE</button>

        <div class="adj-panel" id="pnl">
            <div class="adj-row"><label>Light</label><input type="range" id="br" min="0" max="200" value="100"></div>
            <div class="adj-row"><label>Color</label><input type="range" id="sa" min="0" max="200" value="100"></div>
            <div class="adj-row"><label>BG</label><input type="color" id="bg" value="#ffffff"></div>
            <button onclick="togglePnl()" style="background:#222; color:#fff; border:none; padding:5px; border-radius:5px; margin-top:5px; font-size:10px;">CLOSE</button>
        </div>
    </main>

    <nav class="toolbar">
        <button class="t-btn" id="cp"><span>✂️</span><span>CROP</span></button>
        <button class="t-btn" onclick="togglePnl()"><span>⚙️</span><span>ADJUST</span></button>
        <button class="t-btn" onclick="filter('grayscale(100%)')"><span>🌑</span><span>B&W</span></button>
        <button class="t-btn" onclick="location.reload()"><span>🔄</span><span>RESET</span></button>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const cvs = document.getElementById('canvas'), ctx = cvs.getContext('2d');
    const imgC = document.getElementById('imgToCrop'), up = document.getElementById('up');
    let img = new Image(), crop;

    function togglePnl() { const p = document.getElementById('pnl'); p.style.display = p.style.display==='flex'?'none':'flex'; }

    up.onchange = (e) => {
        const r = new FileReader();
        r.onload = (f) => { img.src = f.target.result; img.onload = () => { imgC.src = img.src; draw(); } };
        r.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        if(!img.src) return;
        cvs.width = img.width; cvs.height = img.height;
        ctx.fillStyle = document.getElementById('bg').value; ctx.fillRect(0,0,cvs.width,cvs.height);
        ctx.filter = `brightness(${document.getElementById('br').value}%) saturate(${document.getElementById('sa').value}%)`;
        ctx.drawImage(img, 0, 0);
    }

    document.querySelectorAll('input').forEach(i => i.oninput = draw);

    document.getElementById('cp').onclick = () => {
        if(!img.src) return;
        cvs.style.display = 'none'; imgC.style.display = 'block'; document.getElementById('doneCrop').style.display = 'block';
        crop = new Cropper(imgC, { viewMode: 1, aspectRatio: 9/16 });
    };

    document.getElementById('doneCrop').onclick = () => {
        img.src = crop.getCroppedCanvas().toDataURL();
        img.onload = () => { draw(); cvs.style.display='block'; imgC.style.display='none'; document.getElementById('doneCrop').style.display='none'; crop.destroy(); };
    };

    function filter(f) { ctx.filter = f; ctx.drawImage(img, 0, 0); }

    document.getElementById('save').onclick = () => {
        const a = document.createElement('a'); a.download = 'D_Photo.png'; a.href = cvs.toDataURL(); a.click();
    };
</script>
</body>
</html>
