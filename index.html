<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D PHOTO TOOLS | WHITE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --main-bg: #ffffff; --tool-bg: #000000; --text-dark: #333; --accent: #000; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--main-bg); color: var(--text-dark); font-family: sans-serif; overflow: hidden; }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        header { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #eee; }
        .logo { font-weight: bold; font-size: 14px; color: #000; }

        /* Workspace: Photo size thoda small aur centered */
        .workspace { flex: 1; display: flex; justify-content: center; align-items: center; background: #f9f9f9; padding: 30px; position: relative; }
        #canvas { max-width: 85%; max-height: 85%; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #imgToCrop { display: none; max-width: 100%; }

        /* Adjust Tools Section: Ab ye Black rahega */
        .adjust-panel { 
            background: var(--tool-bg); 
            color: white; 
            padding: 20px; 
            display: none; /* Initially hidden */
            flex-direction: column; 
            gap: 15px; 
            position: absolute; 
            bottom: 80px; 
            left: 0; 
            right: 0; 
            border-radius: 20px 20px 0 0;
            z-index: 20;
        }
        .row { display: flex; align-items: center; gap: 15px; }
        .row label { font-size: 11px; width: 80px; color: #aaa; }
        input[type="range"] { flex: 1; accent-color: #fff; height: 3px; }

        /* Bottom Toolbar: White Theme */
        .bottom-nav { 
            height: 80px; 
            background: #fff; 
            border-top: 1px solid #eee; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            z-index: 30;
        }
        .tool-btn { 
            background: none; 
            border: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
            font-size: 10px; 
            color: #666; 
            cursor: pointer; 
        }
        .tool-btn.active { color: #000; font-weight: bold; }

        .btn-black { background: #000; color: #fff; border: none; padding: 6px 15px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        #applyCrop { position: absolute; top: 15px; right: 15px; z-index: 100; display: none; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="logo">D PHOTO TOOLS</div>
        <div style="display:flex; gap:10px;">
            <input type="file" id="upload" hidden accept="image/*">
            <button onclick="document.getElementById('upload').click()" class="btn-black" style="background:#eee; color:#000;">ADD</button>
            <button id="download" class="btn-black">SAVE</button>
        </div>
    </header>

    <main class="workspace">
        <canvas id="canvas"></canvas>
        <img id="imgToCrop">
        <button id="applyCrop" class="btn-black">DONE</button>
        
        <!-- Adjust Tools Hidden Panel -->
        <div class="adjust-panel" id="adjustPanel">
            <div class="row"><label>Light</label><input type="range" id="bright" min="0" max="200" value="100"></div>
            <div class="row"><label>Color</label><input type="range" id="satur" min="0" max="200" value="100"></div>
            <div class="row">
                <label>BG Color</label>
                <input type="color" id="bgColor" value="#ffffff" style="width:40px; height:20px; border:none; background:none;">
            </div>
            <button class="btn-black" onclick="toggleAdjust()" style="background:#333; margin-top:10px;">CLOSE</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="tool-btn" id="cropBtn"><span>✂️</span><span>CROP</span></div>
        <div class="tool-btn" onclick="toggleAdjust()" id="adjustToggle"><span>⚙️</span><span>ADJUST</span></div>
        <div class="tool-btn" onclick="applyFilter('grayscale(100%)')"><span>🌑</span><span>B&W</span></div>
        <div class="tool-btn" onclick="location.reload()"><span>🔄</span><span>RESET</span></div>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgDisplay = document.getElementById('imgToCrop');
    let activeImg = new Image();
    let cropper;

    // Toggle Adjust Panel
    function toggleAdjust() {
        const panel = document.getElementById('adjustPanel');
        panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
    }

    document.getElementById('upload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            activeImg = new Image();
            activeImg.src = f.target.result;
            activeImg.onload = () => {
                imgDisplay.src = activeImg.src;
                render();
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function render() {
        if(!activeImg.src) return;
        canvas.width = activeImg.width;
        canvas.height = activeImg.height;

        ctx.fillStyle = document.getElementById('bgColor').value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const b = document.getElementById('bright').value;
        const s = document.getElementById('satur').value;
        ctx.filter = `brightness(${b}%) saturate(${s}%)`;
        
        ctx.drawImage(activeImg, 0, 0);
    }

    document.querySelectorAll('input').forEach(el => {
        el.oninput = render;
    });

    document.getElementById('cropBtn').onclick = () => {
        if(!activeImg.src) return;
        canvas.style.display = 'none';
        imgDisplay.style.display = 'block';
        document.getElementById('applyCrop').style.display = 'block';
        cropper = new Cropper(imgDisplay, { viewMode: 1 });
    };

    document.getElementById('applyCrop').onclick = () => {
        activeImg.src = cropper.getCroppedCanvas().toDataURL();
        activeImg.onload = () => {
            render();
            canvas.style.display = 'block';
            imgDisplay.style.display = 'none';
            document.getElementById('applyCrop').style.display = 'none';
            cropper.destroy();
        };
    };

    function applyFilter(f) {
        ctx.filter = f;
        ctx.drawImage(activeImg, 0, 0);
    }

    document.getElementById('download').onclick = () => {
        const link = document.createElement('a');
        link.download = 'D_Photo_Tools.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    };
</script>
</body>
</html>
