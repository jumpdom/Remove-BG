<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON EDIT | BG CHANGER PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0a; --panel: #151515; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--panel); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        .logo { font-family: 'Orbitron', sans-serif; color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 1.5rem; }
        .main-container { display: flex; flex: 1; }
        .sidebar { width: 300px; background: var(--panel); padding: 20px; border-right: 1px solid #222; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #555; border-left: 3px solid var(--neon); padding-left: 10px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #888; }
        input[type="range"], input[type="color"] { width: 100%; cursor: pointer; }
        input[type="color"] { height: 40px; border: none; background: transparent; }
        .btn { background: transparent; border: 1px solid #333; color: white; padding: 10px; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn:hover { border-color: var(--neon); color: var(--neon); }
        .btn-neon { background: var(--neon); color: black; font-weight: bold; border: none; }
        .editor-view { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; position: relative; }
        canvas { max-width: 90%; max-height: 85vh; border: 1px solid #333; }
        #imgToCrop { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">NEON<span>EDIT</span></div>
    <div>
        <input type="file" id="upload" hidden>
        <label for="upload" class="btn btn-neon" style="padding: 10px 20px;">OPEN PHOTO</label>
        <button id="download" class="btn" style="width:auto; padding: 10px 20px;">SAVE PNG</button>
    </div>
</header>

<div class="main-container">
    <aside class="sidebar">
        <section>
            <h3>1. Background Change</h3>
            <div class="control-group">
                <label>Select New BG Color</label>
                <input type="color" id="bgColor" value="#000000">
            </div>
            <div class="control-group">
                <label>Remove Transparency (Sensitivity)</label>
                <input type="range" id="sensitivity" min="0" max="100" value="10">
            </div>
        </section>

        <section>
            <h3>2. Adjustments</h3>
            <div class="control-group">
                <label>Brightness</label>
                <input type="range" id="bright" min="0" max="200" value="100">
            </div>
        </section>

        <section>
            <h3>3. Tools</h3>
            <button class="btn" id="cropBtn">Crop Photo</button>
            <button class="btn btn-neon" id="applyCrop" style="display:none;">Apply Crop</button>
        </section>
    </aside>

    <main class="editor-view">
        <img id="imgToCrop">
        <canvas id="canvas"></canvas>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const imgDisplay = document.getElementById('imgToCrop');
    let activeImg = new Image();
    let cropper;

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            activeImg.src = f.target.result;
            activeImg.onload = () => {
                imgDisplay.src = activeImg.src;
                render();
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function render() {
        canvas.width = activeImg.width;
        canvas.height = activeImg.height;
        
        // Background color draw
        ctx.fillStyle = document.getElementById('bgColor').value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Applying Brightness
        const b = document.getElementById('bright').value;
        ctx.filter = `brightness(${b}%)`;
        
        // Draw Image
        ctx.drawImage(activeImg, 0, 0);
    }

    // Live update for inputs
    document.querySelectorAll('input').forEach(input => {
        input.oninput = render;
    });

    // Crop functionality
    document.getElementById('cropBtn').onclick = () => {
        canvas.style.display = 'none';
        imgDisplay.style.display = 'block';
        document.getElementById('applyCrop').style.display = 'block';
        cropper = new Cropper(imgDisplay, { viewMode: 1 });
    };

    document.getElementById('applyCrop').onclick = () => {
        activeImg.src = cropper.getCroppedCanvas().toDataURL();
        activeImg.onload = () => {
            render();
            canvas.style.display = 'block';
            imgDisplay.style.display = 'none';
            document.getElementById('applyCrop').style.display = 'none';
            cropper.destroy();
        };
    };

    // Download
    document.getElementById('download').onclick = () => {
        const link = document.createElement('a');
        link.download = 'neon_bg_edit.png';
        link.href = canvas.toDataURL();
        link.click();
    };
</script>
</body>
</html>
