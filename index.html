<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D PHOTO TOOLS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root { --main-bg: #ffffff; --pnl-bg: #000000; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--main-bg); overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        .container { display: flex; flex-direction: column; height: 100vh; }
        
        header { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #eee; }
        .logo { font-weight: 900; font-size: 14px; letter-spacing: 0.5px; }

        /* Photo Viewport - No Scroll */
        .viewer { flex: 1; display: flex; justify-content: center; align-items: center; background: #f0f0f0; padding: 20px; position: relative; }
        #canvas { max-width: 90%; max-height: 85%; object-fit: contain; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border-radius: 4px; }
        #imgToCrop { display: none; }

        /* Adjust Panel (Black Theme) */
        .adjust-box { 
            position: absolute; bottom: 85px; left: 10px; right: 10px; 
            background: var(--pnl-bg); border-radius: 15px; padding: 18px; 
            display: none; flex-direction: column; gap: 15px; z-index: 50; 
        }
        .row { display: flex; align-items: center; gap: 12px; color: #fff; font-size: 11px; }
        .row input { flex: 1; accent-color: #fff; }

        /* Bottom Toolbar */
        .bottom-nav { height: 80px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; background: #fff; }
        .btn-tool { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 10px; color: #777; font-weight: 600; }
        .btn-tool:active { color: #000; }

        .btn-action { background: #000; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-weight: bold; font-size: 11px; }
        #apply { position: absolute; top: 15px; right: 15px; z-index: 100; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">D PHOTO TOOLS</div>
        <div style="display:flex; gap:8px;">
            <input type="file" id="fileInp" hidden accept="image/*">
            <button onclick="document.getElementById('fileInp').click()" class="btn-action" style="background:#f5f5f5; color:#000;">ADD</button>
            <button id="save" class="btn-action">SAVE</button>
        </div>
    </header>

    <main class="viewer">
        <canvas id="canvas"></canvas>
        <img id="imgToCrop">
        <button id="apply" class="btn-action">DONE</button>

        <!-- Hidden Adjust Panel -->
        <div class="adjust-box" id="adjPnl">
            <div class="row"><label>BRIGHT</label><input type="range" id="br" min="0" max="200" value="100"></div>
            <div class="row"><label>COLOR</label><input type="range" id="st" min="0" max="200" value="100"></div>
            <div class="row">
                <label>BG COLOR</label>
                <input type="color" id="bg" value="#ffffff" style="width:40px; height:22px; border:none; background:none;">
            </div>
            <button onclick="openAdj()" class="btn-action" style="background:#222; margin-top:5px; padding:4px;">CLOSE</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="btn-tool" id="crop"><span>✂️</span>CROP</button>
        <button class="btn-tool" onclick="openAdj()"><span>⚙️</span>ADJUST</button>
        <button class="btn-tool" onclick="filterImg('grayscale(100%)')"><span>🌑</span>B&W</button>
        <button class="btn-tool" onclick="location.reload()"><span>🔄</span>RESET</button>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const cv = document.getElementById('canvas'), ctx = cv.getContext('2d');
    const ic = document.getElementById('imgToCrop'), inp = document.getElementById('fileInp');
    let img = new Image(), crp;

    function openAdj() { const p = document.getElementById('adjPnl'); p.style.display = p.style.display==='flex'?'none':'flex'; }

    inp.onchange = (e) => {
        const r = new FileReader();
        r.onload = (f) => { img.src = f.target.result; img.onload = () => { ic.src = img.src; refresh(); } };
        r.readAsDataURL(e.target.files[0]);
    };

    function refresh() {
        if(!img.src) return;
        cv.width = img.width; cv.height = img.height;
        ctx.fillStyle = document.getElementById('bg').value; 
        ctx.fillRect(0,0,cv.width,cv.height);
        ctx.filter = `brightness(${document.getElementById('br').value}%) saturate(${document.getElementById('st').value}%)`;
        ctx.drawImage(img, 0, 0);
    }

    document.querySelectorAll('input').forEach(i => i.oninput = refresh);

    document.getElementById('crop').onclick = () => {
        if(!img.src) return;
        cv.style.display = 'none'; ic.style.display = 'block'; document.getElementById('apply').style.display = 'block';
        crp = new Cropper(ic, { viewMode: 1, aspectRatio: 9/16 });
    };

    document.getElementById('apply').onclick = () => {
        img.src = crp.getCroppedCanvas().toDataURL();
        img.onload = () => { refresh(); cv.style.display='block'; ic.style.display='none'; document.getElementById('apply').style.display='none'; crp.destroy(); };
    };

    function filterImg(f) { ctx.filter = f; ctx.drawImage(img, 0, 0); }

    document.getElementById('save').onclick = () => {
        if(!img.src) return alert("Photo select karein");
        const l = document.createElement('a'); l.download = 'D_PHOTO_EDIT.png'; l.href = cv.toDataURL(); l.click();
    };
</script>
</body>
</html>
